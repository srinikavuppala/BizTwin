<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Twin for Small Business Ops</title>
    <!-- Chart.js for Data Visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #64748b;
            --bg-dark: #0f172a;
            --bg-light: #f1f5f9;
            --white: #ffffff;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: var(--bg-light);
            overflow: hidden;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 250px;
            background-color: var(--bg-dark);
            color: var(--white);
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: all 0.3s;
        }

        .brand {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
        }

        .nav-links {
            list-style: none;
            flex-grow: 1;
        }

        .nav-item {
            margin-bottom: 10px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .nav-link:hover, .nav-link.active {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--white);
        }

        .nav-link i {
            margin-right: 15px;
            width: 20px;
            text-align: center;
        }

        /* Main Content Styles */
        .main-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 30px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #1e293b;
            font-size: 1.8rem;
        }

        /* Dashboard Grid */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-left: 4px solid var(--primary);
        }

        .card h3 {
            color: var(--secondary);
            font-size: 0.9rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card .value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #1e293b;
        }

        .chart-container {
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            height: 400px;
            position: relative;
        }

        /* Tables */
        .table-container {
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background-color: #f8fafc;
            color: var(--secondary);
            font-weight: 600;
        }

        tr:hover {
            background-color: #f8fafc;
        }

        /* Status Badges */
        .badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-success { background: #dcfce7; color: #166534; }
        .badge-warning { background: #fef3c7; color: #92400e; }
        .badge-danger { background: #fee2e2; color: #991b1b; }

        /* Forms & Buttons */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-sm { padding: 6px 12px; font-size: 0.85rem; }

        .btn:hover { opacity: 0.9; }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            margin-bottom: 5px;
            color: #475569;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            max-width: 90%;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Toast Notification */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 2000;
        }

        .toast {
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            margin-top: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Utility */
        .flex-between { display: flex; justify-content: space-between; align-items: center; }

    </style>
</head>
<body>

    <!-- Sidebar Navigation -->
    <nav class="sidebar">
        <div class="brand">
            <i class="fas fa-cube"></i> BizTwin
        </div>
        <ul class="nav-links">
            <li class="nav-item">
                <a class="nav-link active" onclick="app.navigate('dashboard')">
                    <i class="fas fa-chart-line"></i> Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" onclick="app.navigate('inventory')">
                    <i class="fas fa-boxes"></i> Inventory
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" onclick="app.navigate('sales')">
                    <i class="fas fa-cash-register"></i> Sales Tracking
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" onclick="app.navigate('insights')">
                    <i class="fas fa-brain"></i> Predictive AI
                </a>
            </li>
        </ul>
        <div style="margin-top: auto; font-size: 0.8rem; color: #64748b;">
            Connected to: <span style="color: var(--success);">Oracle DB (Live)</span>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <header>
            <h1 id="page-title">Dashboard Overview</h1>
            <div class="user-profile">
                <img src="https://picsum.photos/seed/admin/40/40" alt="Admin" style="border-radius: 50%;">
            </div>
        </header>

        <!-- Dynamic Views Container -->
        <div id="view-container">
            <!-- Content injected via JS -->
        </div>
    </main>

    <!-- Modal for Add Inventory -->
    <div id="inventory-modal" class="modal">
        <div class="modal-content">
            <h2>Add New Product</h2>
            <br>
            <form id="add-inventory-form">
                <div class="form-group">
                    <label class="form-label">Product Name</label>
                    <input type="text" class="form-control" name="name" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Category</label>
                    <select class="form-control" name="category">
                        <option>Electronics</option>
                        <option>Groceries</option>
                        <option>Clothing</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Stock Qty</label>
                    <input type="number" class="form-control" name="stock" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Price ($)</label>
                    <input type="number" step="0.01" class="form-control" name="price" required>
                </div>
                <div class="flex-between">
                    <button type="button" class="btn" onclick="document.getElementById('inventory-modal').classList.remove('active')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save to Oracle DB</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script>
        // --- CONFIGURATION ---
        // Make sure your Node.js server is running on this port
        const API_URL = "http://localhost:3000/api"; 

        const app = {
            
            init: () => {
                app.navigate('dashboard');
                app.setupEventListeners();
            },

            navigate: (viewName) => {
                // Update Sidebar UI
                document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
                const activeLink = document.querySelector(`.nav-link[onclick="app.navigate('${viewName}')"]`);
                if(activeLink) activeLink.classList.add('active');

                const container = document.getElementById('view-container');
                const title = document.getElementById('page-title');

                // Simple Router
                switch(viewName) {
                    case 'dashboard':
                        title.innerText = "Dashboard Overview";
                        app.renderDashboard(container);
                        break;
                    case 'inventory':
                        title.innerText = "Inventory Management";
                        app.renderInventory(container);
                        break;
                    case 'sales':
                        title.innerText = "Sales Tracking";
                        app.renderSales(container);
                        break;
                    case 'insights':
                        title.innerText = "Predictive Insights (AI)";
                        app.renderInsights(container);
                        break;
                }
            },

            // --- API HELPERS ---
            fetchData: async (endpoint) => {
                try {
                    const response = await fetch(`${API_URL}/${endpoint}`);
                    if (!response.ok) throw new Error('Network response was not ok');
                    return await response.json();
                } catch (error) {
                    console.error("API Error:", error);
                    app.showToast("Failed to connect to Database");
                    return [];
                }
            },

            postData: async (endpoint, data) => {
                try {
                    const response = await fetch(`${API_URL}/${endpoint}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    return await response.json();
                } catch (error) {
                    console.error("API Error:", error);
                    app.showToast("Failed to save data");
                    throw error;
                }
            },

            // --- RENDERERS (API CONNECTED) ---

            renderDashboard: async (container) => {
                // Fetch real data from Oracle DB via Node
                const [inventory, sales] = await Promise.all([
                    app.fetchData('inventory'),
                    app.fetchData('sales')
                ]);

                // Calculations
                const totalRevenue = sales.reduce((sum, sale) => sum + parseFloat(sale.total), 0);
                const lowStockItems = inventory.filter(i => parseFloat(i.stock) < parseFloat(i.minstock)).length;
                const totalTransactions = sales.length;

                container.innerHTML = `
                    <div class="grid-container">
                        <div class="card" style="border-left-color: #4f46e5;">
                            <h3>Total Revenue</h3>
                            <div class="value">$${totalRevenue.toFixed(2)}</div>
                        </div>
                        <div class="card" style="border-left-color: #ef4444;">
                            <h3>Low Stock Alerts</h3>
                            <div class="value" style="color: #ef4444;">${lowStockItems} Items</div>
                        </div>
                        <div class="card" style="border-left-color: #10b981;">
                            <h3>Total Transactions</h3>
                            <div class="value">${totalTransactions}</div>
                        </div>
                    </div>

                    <div class="grid-container" style="grid-template-columns: 2fr 1fr;">
                        <div class="chart-container">
                            <canvas id="revenueChart"></canvas>
                        </div>
                        <div class="chart-container">
                            <canvas id="inventoryChart"></canvas>
                        </div>
                    </div>
                `;
                app.initCharts(sales, inventory);
            },

            renderInventory: async (container) => {
                const inventory = await app.fetchData('inventory');

                let rows = inventory.map(item => {
                    // Note: Oracle column names often uppercase; we used 'as' alias in backend, but safe access is lowercase here
                    const stock = parseFloat(item.stock);
                    const minStock = parseFloat(item.minstock);
                    
                    let statusClass = stock < minStock ? 'badge-danger' : 'badge-success';
                    let statusText = stock < minStock ? 'Low Stock' : 'In Stock';
                    let actionBtn = stock < minStock ? `<button class="btn btn-sm btn-primary" onclick="app.restock(${item.id})">Restock</button>` : '';

                    return `
                        <tr>
                            <td>${item.id}</td>
                            <td>${item.name}</td>
                            <td>${item.category}</td>
                            <td>$${item.price}</td>
                            <td>${stock}</td>
                            <td><span class="badge ${statusClass}">${statusText}</span></td>
                            <td>${actionBtn}</td>
                        </tr>
                    `;
                }).join('');

                container.innerHTML = `
                    <div class="flex-between" style="margin-bottom: 20px;">
                        <input type="text" placeholder="Search products..." class="form-control" style="width: 300px;">
                        <button class="btn btn-primary" onclick="document.getElementById('inventory-modal').classList.add('active')">
                            <i class="fas fa-plus"></i> Add Product
                        </button>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Product Name</th>
                                    <th>Category</th>
                                    <th>Price</th>
                                    <th>Stock</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                `;
            },

            renderSales: async (container) => {
                // Fetch inventory for dropdown and Sales for history
                const [inventory, sales] = await Promise.all([
                    app.fetchData('inventory'),
                    app.fetchData('sales')
                ]);

                let productOptions = inventory.map(p => `<option value="${p.id}" data-price="${p.price}">${p.name} ($${p.price})</option>`).join('');

                let rows = sales.sort((a,b) => new Date(b.date) - new Date(a.date)).map(sale => `
                    <tr>
                        <td>#${sale.id}</td>
                        <td>${sale.date}</td>
                        <td>Customer #${sale.customer}</td>
                        <td>${sale.items} Items</td>
                        <td>$${sale.total}</td>
                        <td><span class="badge badge-success">Completed</span></td>
                    </tr>
                `).join('');

                container.innerHTML = `
                    <div class="grid-container" style="grid-template-columns: 1fr 2fr;">
                        <div class="card">
                            <h3>Record New Sale</h3>
                            <form id="sale-form">
                                <div class="form-group">
                                    <label class="form-label">Customer Name</label>
                                    <input type="text" id="sale-customer" class="form-control" required placeholder="Walk-in Customer">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Select Product</label>
                                    <select id="sale-product" class="form-control" onchange="app.updateSalePrice(this)">
                                        ${productOptions}
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Total Price</label>
                                    <input type="number" id="sale-total" class="form-control" readonly>
                                </div>
                                <button type="submit" class="btn btn-primary" style="width: 100%">Confirm Sale</button>
                            </form>
                        </div>
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Trans ID</th>
                                        <th>Date</th>
                                        <th>Customer</th>
                                        <th>Items</th>
                                        <th>Amount</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody>${rows}</tbody>
                            </table>
                        </div>
                    </div>
                `;
                
                // Trigger price update for first item
                const select = document.getElementById('sale-product');
                if(select) app.updateSalePrice(select);
            },
            
            renderInsights: (container) => {
                 container.innerHTML = `
                    <div class="card" style="margin-bottom: 20px;">
                        <h3><i class="fas fa-robot"></i> AI Forecast</h3>
                        <p style="margin-top: 10px; color: #475569;">
                            Based on current sales velocity and inventory turnover, here are the actionable insights:
                        </p>
                    </div>
                    <div class="grid-container">
                        <div class="card" style="border-left-color: #8b5cf6;">
                            <h3>Revenue Prediction</h3>
                            <p class="value" style="color: #8b5cf6; font-size: 1.4rem;">+12% vs Last Month</p>
                            <p style="font-size: 0.8rem; margin-top: 5px;">Trend Analysis</p>
                        </div>
                        <div class="card" style="border-left-color: #ec4899;">
                            <h3>Restock Alert</h3>
                            <p class="value" style="color: #ec4899; font-size: 1.4rem;">Almond Milk</p>
                            <p style="font-size: 0.8rem; margin-top: 5px;">Will be out of stock in 2 days</p>
                        </div>
                    </div>
                    <div class="chart-container">
                        <h3 style="margin-bottom: 15px; color: #64748b;">Sales Trend Projection</h3>
                        <canvas id="predictiveChart"></canvas>
                    </div>
                `;
                
                setTimeout(() => {
                    const ctx = document.getElementById('predictiveChart').getContext('2d');
                    new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4 (Forecast)', 'Week 5 (Forecast)'],
                            datasets: [{
                                label: 'Projected Sales',
                                data: [1200, 1500, 1700, 1900, 2200],
                                borderColor: '#8b5cf6',
                                borderDash: [5, 5],
                                tension: 0.4,
                                fill: true,
                                backgroundColor: 'rgba(139, 92, 246, 0.1)'
                            }]
                        }
                    });
                }, 100);
            },

            // --- ACTIONS ---

            updateSalePrice: (selectElement) => {
                const price = selectElement.options[selectElement.selectedIndex].getAttribute('data-price');
                const totalInput = document.getElementById('sale-total');
                if(totalInput) totalInput.value = price;
            },

            setupEventListeners: () => {
                // Add Inventory Form
                const addForm = document.getElementById('add-inventory-form');
                if(addForm) {
                    addForm.addEventListener('submit', async (e) => {
                        e.preventDefault();
                        const formData = new FormData(e.target);
                        const data = {
                            name: formData.get('name'),
                            category: formData.get('category'),
                            stock: parseInt(formData.get('stock')),
                            price: parseFloat(formData.get('price'))
                        };

                        try {
                            await app.postData('inventory', data);
                            app.showToast('Product added to Oracle DB');
                            document.getElementById('inventory-modal').classList.remove('active');
                            app.renderInventory(document.getElementById('view-container'));
                            e.target.reset();
                        } catch (err) {
                            // Error handled in postData
                        }
                    });
                }

                // Add Sale Form (Event Delegation because form is dynamic)
                document.addEventListener('submit', async (e) => {
                    if (e.target.id === 'sale-form') {
                        e.preventDefault();
                        const total = document.getElementById('sale-total').value;
                        try {
                            await app.postData('sales', { total: total });
                            app.showToast('Sale recorded in Oracle DB');
                            app.renderSales(document.getElementById('view-container'));
                        } catch (err) {
                            // Error handled in postData
                        }
                    }
                });
            },

            restock: async (id) => {
                try {
                    await fetch(`${API_URL}/inventory/${id}`, { method: 'PUT' });
                    app.showToast('Inventory Restocked');
                    app.renderInventory(document.getElementById('view-container'));
                } catch (err) {
                    app.showToast('Failed to restock');
                }
            },

            initCharts: (sales, inventory) => {
                // Revenue Chart
                const ctx1 = document.getElementById('revenueChart');
                if(ctx1) {
                    new Chart(ctx1, {
                        type: 'bar',
                        data: {
                            labels: sales.map(s => s.date),
                            datasets: [{
                                label: 'Daily Revenue ($)',
                                data: sales.map(s => s.total),
                                backgroundColor: '#4f46e5',
                                borderRadius: 4
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false }
                    });
                }
                
                // Inventory Chart
                const ctx2 = document.getElementById('inventoryChart');
                if(ctx2) {
                    new Chart(ctx2, {
                        type: 'doughnut',
                        data: {
                            labels: inventory.map(i => i.name),
                            datasets: [{ data: inventory.map(i => i.stock), backgroundColor: ['#4f46e5', '#ef4444', '#10b981', '#f59e0b', '#64748b'] }]
                        },
                        options: { responsive: true, maintainAspectRatio: false }
                    });
                }
            },

            showToast: (message) => {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.innerText = message;
                container.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }
        };

        // Start App
        window.onload = app.init;

    </script>
</body>
</html>
